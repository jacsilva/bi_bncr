# Perfil de conexão do dbt. Lê as mesmas variáveis do .env do projeto.
# Schema default = staging (conforme solicitado).
sinesp_ppe:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PGHOST') }}"
      port: "{{ env_var('PGPORT') | int }}"
      user: "{{ env_var('PGUSER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('PGDATABASENAME', 'databricks-postgres') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA', 'public') }}"
      threads: 4
